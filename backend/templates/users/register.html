{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 bg-white">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">

    <div class="text-center mb-6">
      <a href="{% url 'home_landing' %}" class="text-3xl font-black tracking-tighter text-blue-600 inline-block">
        Empower <span class="text-gray-900">Edge</span>
      </a>
    </div>

    <div class="bg-white border-2 border-slate-200 p-8 rounded-3xl shadow-sm">
        <h2 class="text-2xl font-black tracking-tight text-slate-900 text-center mb-2">Join Empower Edge</h2>
        <p class="text-xs text-slate-500 font-bold text-center mb-8">
            Create an account to start managing curriculums or tracking your learning progress.
        </p>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-black uppercase tracking-wider text-slate-900 mb-1.5">Email Address</label>
                <input type="email" name="email" autocomplete="email"
                       class="w-full px-4 py-3 bg-slate-50 text-slate-900 font-medium text-sm border-2 border-slate-400 rounded-xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100"
                       required>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-wider text-slate-900 mb-1.5">Password</label>
                <input type="password" name="password" autocomplete="new-password"
                       class="w-full px-4 py-3 bg-slate-50 text-slate-900 font-medium text-sm border-2 border-slate-400 rounded-xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100"
                       required>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-wider text-slate-900 mb-1.5">Phone Number</label>
                <input type="text" name="phone_number" autocomplete="tel" placeholder="e.g., +260"
                       class="w-full px-4 py-3 bg-slate-50 text-slate-900 font-medium text-sm border-2 border-slate-400 rounded-xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100">
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-wider text-slate-900 mb-1.5">Physical Address</label>
                <textarea name="address" rows="2"
                          class="w-full px-4 py-3 bg-slate-50 text-slate-900 font-medium text-sm border-2 border-slate-400 rounded-xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100 resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-wider text-slate-900 mb-1.5">I am a...</label>
                <div class="relative">
                    <select name="role"
                            class="w-full px-4 py-3 bg-slate-50 text-slate-900 font-black text-xs uppercase tracking-wider border-2 border-slate-400 rounded-xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100 appearance-none cursor-pointer">
                        <option value="LEARNER">Learner (Student)</option>
                        <option value="EDUCATOR">Educator (Instructor)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-900">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-xl shadow-blue-100 border border-blue-700 cursor-pointer">
                    Register New Account
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-xs text-slate-500 font-bold">
            Already have an active account?
            <a href="{% url 'login' %}" class="font-black text-blue-600 hover:text-blue-700 underline ml-0.5">Sign in here</a>
        </p>
    </div>
  </div>
</div>
{% endblock %}
