{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 bg-white">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="text-center mb-6">
      <a href="{% url 'home' %}" class="text-3xl font-black tracking-tighter text-blue-600 inline-block">
        Empower <span class="text-gray-900">Edge</span>
      </a>
    </div>

    <div class="bg-white border-2 border-slate-200 p-8 rounded-3xl shadow-sm text-center">
        <h2 class="text-2xl font-black tracking-tight text-slate-900 mb-2">Verify Your Identity</h2>
        <p class="text-sm text-slate-500 font-bold mb-8 leading-normal">
            We have sent a secure 6-digit verification PIN code to your active email. Please enter it right below to gain access.
        </p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <input type="text"
                       name="pin"
                       maxlength="6"
                       pattern="[0-9]{6}"
                       inputmode="numeric"
                       class="text-center text-4xl font-black tracking-[0.4em] w-full px-4 py-4 bg-slate-50 text-slate-900 border-2 border-slate-400 rounded-2xl outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-100 placeholder-slate-300 placeholder:tracking-normal"
                       placeholder="000000"
                       required
                       autocomplete="one-time-code">
            </div>

            <div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition shadow-xl shadow-blue-100 cursor-pointer border border-blue-700">
                    Verify Identity PIN
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-xs text-slate-400 font-bold tracking-wide">
            Didn't receive a security code?
            <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-700 underline ml-1 font-black">Try re-sending</a>
        </p>
    </div>
  </div>
</div>
{% endblock %}
