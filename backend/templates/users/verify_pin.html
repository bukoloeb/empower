{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow-md text-center">
    <h2 class="text-2xl font-bold mb-4">Verify Your Identity</h2>
    <p class="text-gray-600 mb-6">We've sent a 6-digit PIN to your email. Please enter it below.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="pin" maxlength="6" class="text-center text-3xl tracking-widest w-full px-4 py-2 border rounded-lg mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="000000" required>
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">Verify PIN</button>
    </form>
</div>
{% endblock %}
