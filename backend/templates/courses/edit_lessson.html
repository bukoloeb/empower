{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-12 px-4">
    <div class="mb-10 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Edit Question</h1>
            <p class="text-sm text-gray-500 font-bold mt-1 uppercase">Quiz: {{ quiz.title }}</p>
        </div>
        <a href="{% url 'manage_quiz_questions' quiz.id %}" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-gray-600 transition">
            Cancel Changes
        </a>
    </div>

    <form method="POST" class="bg-white border border-gray-300 rounded-3xl p-10 shadow-xl space-y-8">
        {% csrf_token %}
        <div>
            <label class="block text-[11px] font-black text-gray-500 uppercase tracking-widest mb-2">Question Text</label>
            <textarea name="question_text" required 
                      class="w-full rounded-xl border-gray-400 bg-white p-3 text-sm font-bold text-gray-900 focus:ring-2 focus:ring-blue-500 shadow-sm" 
                      rows="3">{{ question.text }}</textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for choice in choices %}
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Choice {{ forloop.counter }}</label>
                <div class="flex items-center gap-3">
                    <input type="text" name="choice_{{ forloop.counter }}" value="{{ choice.text }}" required 
                           class="flex-1 rounded-xl border-gray-400 bg-white p-3 text-sm font-bold text-gray-900 focus:ring-2 focus:ring-blue-500">
                    <div class="flex flex-col items-center">
                        <input type="radio" name="correct_choice" value="{{ forloop.counter }}" 
                               {% if choice.is_correct %}checked{% endif %} required 
                               class="w-6 h-6 text-green-600 border-gray-400 focus:ring-green-500">
                        <span class="text-[8px] font-black text-gray-400 uppercase mt-1">Correct</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl hover:bg-blue-700 transition-all">
            Update Question
        </button>
    </form>
</div>
{% endblock %}
