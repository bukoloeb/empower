{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-12 px-4">
    <nav class="flex mb-4 text-[10px] font-black uppercase tracking-widest text-gray-500">
        <a href="{% url 'manage_curriculum' module.course.slug %}" class="hover:text-blue-600 transition">Curriculum</a>
        <span class="mx-2 text-gray-300">/</span>
        <span class="text-gray-900">New Quiz</span>
    </nav>

    <div class="mb-10 text-center">
        <h1 class="text-3xl font-black text-gray-900 tracking-tight">Create Module Quiz</h1>
        <p class="text-sm text-gray-500 font-bold mt-1 uppercase tracking-tight">
            Adding to: <span class="text-blue-600">{{ module.title }}</span>
        </p>
    </div>

    <form method="POST" class="bg-white border border-gray-300 rounded-3xl p-10 shadow-2xl space-y-8">
        {% csrf_token %}
        
        <div class="space-y-2">
            <label class="block text-[11px] font-black text-gray-500 uppercase tracking-widest">
                Quiz Title
            </label>
            <input type="text" name="title" required 
                   class="w-full rounded-xl border-gray-400 bg-white p-4 text-sm font-bold text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm transition-all" 
                   placeholder="e.g. Module 1 Final Assessment">
            <p class="text-[10px] text-gray-400 font-medium italic">
                Give your quiz a clear name. You will add questions on the next screen.
            </p>
        </div>

        <div class="flex flex-col gap-3 pt-4">
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98]">
                Save & Add Questions
            </button>
            
            <a href="{% url 'manage_curriculum' module.course.slug %}" 
               class="text-center bg-gray-100 text-gray-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
