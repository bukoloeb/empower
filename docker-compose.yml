services:
  db:
    image: postgres:15
    container_name: empower_db
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data/
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_DB=empower_edge_db
      - POSTGRES_USER=edward_admin
      - POSTGRES_PASSWORD=secure_password_123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edward_admin -d empower_edge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: ./backend
    container_name: empower_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_v2: